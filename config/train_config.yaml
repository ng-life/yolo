# SKU-110K Training Configuration
# Overrides default Ultralytics train arguments

# ── Model ──────────────────────────────────────────────────────────────────────
model: yolo11n.pt # pretrained weights; swap to yolo11s/m/l/x for larger models
# Alternatives: yolo8n.pt, yolo11n.yaml (train from scratch)

# ── Dataset ────────────────────────────────────────────────────────────────────
data: SKU-110K.yaml # built-in Ultralytics dataset config (auto-downloads ~13.6 GB)

# ── Training ───────────────────────────────────────────────────────────────────
epochs: 100
patience: 50 # early stopping patience (epochs without improvement)
batch: 16 # -1 = auto-batch (uses ~60% of GPU VRAM)
imgsz: 640

# ── Optimisation ---------------------------------------------------------------
optimizer: AdamW
lr0: 0.001 # initial learning rate
lrf: 0.01 # final LR = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# ── Augmentation ---------------------------------------------------------------
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0 # rotation — keep 0 for upright shelf images
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0 # shelves are never upside-down
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0

# ── Checkpoint / Saving --------------------------------------------------------
project: runs/sku110k # output directory
name: train # experiment name  → saves to runs/sku110k/train
save: true
save_period: 10 # save checkpoint every N epochs  (-1 = only best/last)
exist_ok: false

# ── Hardware -------------------------------------------------------------------
device: "mps" # "" = auto-detect (GPU > MPS > CPU)
workers: 8 # dataloader workers
amp: true # automatic mixed precision


# ── Logging (uncomment to enable) ---------------------------------------------
# plots: true
# tensorboard: true
# wandb: false
